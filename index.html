    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
            font-weight: 700;
            background: #0a0a14;
            color: #e8e6e3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        .logo {
            width: 350px;
            height: auto;
            margin-bottom: 1.5rem;
        }
        .lang-switch {
            position: fixed;
            top: 1.2rem;
            right: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #777;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            border: 1px solid #333;
            border-radius: 20px;
            padding: 0.4rem 0.9rem;
            transition: all 0.3s;
        }
        .lang-switch:hover {
            color: #fffdd0;
            border-color: #fffdd0;
            background: rgba(255, 253, 208, 0.05);
        }
        .lang-switch svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }
        h1 {
            position: absolute;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
        }
        .tagline {
            font-size: 1.1rem;
            font-weight: 700;
            color: #a8a4a0;
            margin-bottom: 2.5rem;
            line-height: 1.6;
            text-shadow: 1px 1px 4px rgba(88, 28, 135, 0.6);
        }
        .links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }
        .links-row {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: #fffdd0;
            text-decoration: none;
            padding: 0.7rem 1.3rem;
            border: 1px solid #333;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-shadow: 1px 1px 4px rgba(88, 28, 135, 0.6);
        }
        .links a:hover {
            border-color: #fffdd0;
            background: rgba(255, 253, 208, 0.05);
        }
        .links a svg {
            width: 20px;
            height: 20px;
            fill: #fffdd0;
            flex-shrink: 0;
        }
        .platform-btn {
            display: inline-block;
            color: #fffdd0;
            text-decoration: none;
            padding: 0.6rem 1.8rem;
            border: 2px solid #fffdd0;
            border-radius: 25px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            margin-bottom: 2rem;
            transition: all 0.3s;
        }
        .platform-btn:hover {
            background: rgba(255, 253, 208, 0.1);
        }
        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #555;
            font-weight: 700;
        }
        footer a { color: #777; text-decoration: none; }
        footer a:hover { color: #aaa; }
    </style>
</head>
