<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pluma Noturna</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a14;
            color: #e8e6e3;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.15em;
            margin-bottom: 1rem;
            color: #fffdd0;
        }
        .tagline {
            font-size: 1.1rem;
            color: #a8a4a0;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }
        .links {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        .links a {
            color: #fffdd0;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border: 1px solid #333;
            border-radius: 8px;
            transition: all 0.3s;
            font-size: 0.95rem;
        }
        .links a:hover {
            border-color: #fffdd0;
            background: rgba(255, 253, 208, 0.05);
        }
        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #555;
        }
        footer a { color: #777; text-decoration: none; }
        footer a:hover { color: #aaa; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Pluma Noturna</h1>
        <p class="tagline">Historias relaxantes para acalmar a mente e embalar o sono.</p>
        <div class="links">
            <a href="https://www.youtube.com/@plumanoturna">YouTube</a>
            <a href="https://www.tiktok.com/@plumanoturna">TikTok</a>
        </div>
    </div>
    <footer>
        <a href="/privacy-policy">Politica de Privacidade</a> &middot;
        <a href="/terms-of-service">Termos de Uso</a>
    </footer>
</body>
</html>
